<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Media Server</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        
        :root {
            font-size: 16px;
        }

        @media screen and (max-width: 768px) {
            :root {
                font-size: 13px; 
            }
        }

        @media screen and (min-width: 2560px) {
            :root {
                font-size: 20px;
            }
        }


        .backdrop-gradient {
            background: linear-gradient(to top, #09090b 5%, rgba(9, 9, 11, 0.1) 50%, rgba(9, 9, 11, 0.7) 100%);
        }
        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
        .hide-cursor { cursor: none !important; }

        .carousel-viewport {
			position: relative;
			height: 70vh; 
			min-height: 400px;
			max-height: 800px; 
			width: 100%;
			overflow: hidden;
			background: #09090b;
		}

        @media (min-width: 2560px) {
            .carousel-viewport {
                height: 60vh;
            }
        }

        .hero-slide {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .slide-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            transform: scale(1.05); 
            filter: blur(20px) brightness(0.6);
            z-index: 1;
        }
        
        .hero-slide.slide-active {
            opacity: 1;
            pointer-events: auto;
            z-index: 10;
        }

        .hero-slide .slide-content {
            transform: translateX(30px);
            opacity: 0;
            transition: transform 1s cubic-bezier(0.25, 1, 0.5, 1) 0.2s, opacity 1s ease 0.2s;
        }

        .hero-slide.slide-active .slide-content {
            transform: translateX(0);
            opacity: 1;
        }
		
        .track-container {
            position: relative;
            height: 4px;
            background: rgba(63, 63, 70, 0.6);
            border-radius: 9999px;
            cursor: pointer;
            transition: height 0.15s;
        }
		
		.track-container::before {
			content: '';
			position: absolute;
			inset: -12px 0;
		}
        .track-container:hover { height: 6px; }
        
        .track-progress {
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            background: #ffffff;
            border-radius: 9999px;
            width: 100%;
            pointer-events: none;
        }
        
        .track-handle {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 12px;
            height: 12px;
            background: #ffffff;
            border-radius: 50%;
            pointer-events: none;
            transition: transform 0.15s;
        }
        .track-container:hover .track-handle { transform: translate(-50%, -50%) scale(1); }

        #custom-subtitle-text {
            background-color: transparent !important;
            padding: 0 !important;
            border: none !important;
            border-radius: 0 !important;
            box-shadow: none !important;
            font-size: 2.5rem;
            line-height: 1.2;
            font-weight: 600;
            text-shadow: 
                -2px -2px 0 #000,
                 2px -2px 0 #000,
                -2px  2px 0 #000,
                 2px  2px 0 #000,
                 0    4px 6px rgba(0,0,0,0.9);
        }

        @media (max-width: 768px) {
            #custom-subtitle-text {
                font-size: 1.75rem;
                text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            }
        }
    </style>
</head>

    <script>
		const volIcon = document.getElementById('vol-icon');
		const muteIcon = document.getElementById('mute-icon');
        const grid = document.getElementById('movie-grid');
        const slideA = document.getElementById('hero-slide-a');
        const slideB = document.getElementById('hero-slide-b');
        
        const videoModal = document.getElementById('video-modal');
        const video = document.getElementById('main-video');
        const playerControls = document.getElementById('player-controls');
        const playerTopBar = document.getElementById('player-top-bar');
        const playerMovieTitle = document.getElementById('player-movie-title');
        
        const subtitlesBtn = document.getElementById('subtitles-btn');
        const subtitlesMenu = document.getElementById('subtitles-menu');
        const customSubOverlay = document.getElementById('custom-subtitle-overlay');
        const customSubText = document.getElementById('custom-subtitle-text');
        
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        
        const timelineContainer = document.getElementById('timeline-container');
        const timelineProgress = document.getElementById('timeline-progress');
        const timelineHandle = document.getElementById('timeline-handle');
        const timePreview = document.getElementById('time-preview');
        
        const timeCurrent = document.getElementById('time-current');
        const timeDuration = document.getElementById('time-duration');
        
        const volumeArea = document.getElementById('volume-area');
        const volumeContainer = document.getElementById('volume-container');
        const volumeProgress = document.getElementById('volume-progress');
        const volumeHandle = document.getElementById('volume-handle');
        const volumeIndicator = document.getElementById('volume-indicator');
        const muteBtn = document.getElementById('mute-btn');
        
        const closePlayerBtn = document.getElementById('close-player-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');

        const bannerControls = document.getElementById('banner-controls');
        const bannerPrevBtn = document.getElementById('banner-prev-btn');
        const bannerNextBtn = document.getElementById('banner-next-btn');

        const resumeModal = document.getElementById('resume-modal');
        const resumeText = document.getElementById('resume-text');
        const resumeBtnYes = document.getElementById('resume-btn-yes');
        const resumeBtnNo = document.getElementById('resume-btn-no');

        let currentHeroIndex = 0;
        let controlTimeout = null;
        let bannerControlTimeout = null;
        let isDraggingTimeline = false;
        let isDraggingVolume = false; 
        let lastVolume = 1;
        let currentVolume = 1;
        let activeSlideEl = slideA;
        let hiddenSlideEl = slideB;
        let rotationInterval = null;
        let progressSaveInterval = null;
        let activeMovieFile = ""; 

        let parsedSubtitles = [];
        let activeSubtitleLanguage = 'off';
        let subCache = { de: [], en: [] };

        if (typeof movieLibrary !== 'undefined' && movieLibrary.length > 0) {
            renderGrid(movieLibrary);
            const randomIndex = Math.floor(Math.random() * movieLibrary.length);
            initHeroView(randomIndex);
            startBannerRotation();
        }

        function renderGrid(library) {
            grid.innerHTML = library.map((movie, index) => `
                <div onclick="launchTheaterByIndex(${index})" class="group cursor-pointer flex flex-col gap-2 w-full max-w-[200px]">
                    <div class="aspect-[2/3] w-full bg-zinc-900 rounded-lg overflow-hidden relative shadow-md">
                        <div class="absolute inset-0 bg-cover bg-center transition duration-500 group-hover:scale-105 " style="background-image: url('${movie.poster || 'metadata/placeholder.png'}')"></div>
                        <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                            <div class="bg-white text-black  p-3 rounded-full shadow-2xl flex items-center justify-center">
                                <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                    </div>
                    <div class="px-0.5">
                        <h3 class="font-medium text-xs sm:text-sm text-zinc-200 group-hover:text-white truncate transition duration-200">${movie.title}</h3>
                    </div>
                </div>
            `).join('');
        }
		
		

        function populateSlideData(slideElement, movieIndex) {
            const movie = movieLibrary[movieIndex];
            
            const bgEl = slideElement.querySelector('.slide-bg');
            if (bgEl) bgEl.style.backgroundImage = `url('${movie.backdrop || movie.poster || ''}')`;
            
            const titleEl = slideElement.querySelector('.current-title');
            const logoEl = slideElement.querySelector('.current-logo');
            const descEl = slideElement.querySelector('.current-desc');
            const playBtn = slideElement.querySelector('.btn-play');

            if (movie.logo) {
                logoEl.src = movie.logo;
                logoEl.classList.remove('hidden');
                titleEl.classList.add('hidden');
            } else {
                titleEl.innerText = movie.title;
                titleEl.classList.remove('hidden');
                logoEl.classList.add('hidden');
            }
            descEl.innerText = movie.description || "No Overview Provided.";
            playBtn.onclick = () => launchTheaterByIndex(movieIndex);
        }

        function initHeroView(index) {
            currentHeroIndex = index;
            populateSlideData(activeSlideEl, index);
            activeSlideEl.className = "hero-slide slide-active";
        }

        function transitionHeroView(nextIndex) {
            currentHeroIndex = nextIndex;
            populateSlideData(hiddenSlideEl, nextIndex);
            
            hiddenSlideEl.className = "hero-slide slide-active";
            activeSlideEl.className = "hero-slide"; 

            const temp = activeSlideEl;
            activeSlideEl = hiddenSlideEl;
            hiddenSlideEl = temp;
        }

        function startBannerRotation() {
            if (rotationInterval) clearInterval(rotationInterval);
            rotationInterval = setInterval(() => {
                if (videoModal.classList.contains('hidden')) {
                    let nextIndex = (currentHeroIndex + 1) % movieLibrary.length;
                    transitionHeroView(nextIndex);
                }
            }, 10000);
        }

        bannerNextBtn.addEventListener('click', () => {
            let nextIndex = (currentHeroIndex + 1) % movieLibrary.length;
            transitionHeroView(nextIndex);
            startBannerRotation();
        });

        bannerPrevBtn.addEventListener('click', () => {
            let prevIndex = (currentHeroIndex - 1 + movieLibrary.length) % movieLibrary.length;
            transitionHeroView(prevIndex);
            startBannerRotation();
        });

        function resetBannerControlTimeout() {
            bannerControls.style.opacity = '1';
            clearTimeout(bannerControlTimeout);
            bannerControlTimeout = setTimeout(() => {
                bannerControls.style.opacity = '0';
            }, 2500);
        }
        document.querySelector('.carousel-viewport').addEventListener('mousemove', resetBannerControlTimeout);

        function parseSRT(data) {
			const map = [];
			const blocks = data.replace(/\r\n/g, '\n').split('\n\n');
			
			for (let block of blocks) {
				const lines = block.split('\n');
				if (lines.length >= 2) {
					const timeMatch = block.match(/(\d{2}:\d{2}:\d{2}[,.]\d{3})\s*-->\s*(\d{2}:\d{2}:\d{2}[,.]\d{3})/);
					
					if (timeMatch) {
						const start = timeToSeconds(timeMatch[1]);
						const end = timeToSeconds(timeMatch[2]);
						
						let text = lines.slice(lines.indexOf(timeMatch[0]) + 1).join('\n');
						
						text = text.replace(/<\/?[^>]+(>|$)/g, "");
						
						map.push({ start, end, text });
					}
				}
			}
			return map;
		}

		function timeToSeconds(t) {
			const [h, m, s] = t.split(':');
			const [sec, ms] = s.split(/[,.]/);
			return parseInt(h) * 3600 + parseInt(m) * 60 + parseInt(sec) + parseInt(ms) / 1000;
		}

        const languageNames = {
            'de': 'Deutsch',
            'de-ch': 'Schwyzerdütsch',
            'en': 'English',
            'en-us': 'English (US)',
            'en-gb': 'English (UK)',
            'fr': 'Français',
            'it': 'Italiano',
            'nl': 'Nederlands',
            
            'es': 'Español',
            'es-419': 'Español (Latinoamérica)',
            'pt': 'Português',
            'pt-br': 'Português (Brasil)',
            'el': 'Ελληνικά (Greek)',
            
            'pl': 'Polski',
            'ru': 'Русский (Russian)',
            'uk': 'Українська (Ukrainian)',
            'tr': 'Türkçe',
            'cs': 'Čeština',
            'hu': 'Magyar',
            'ro': 'Română',
            'sv': 'Svenska',
            'da': 'Dansk',
            'no': 'Norsk',
            'fi': 'Suomi',
            
            'ja': '日本語 (Japanese)',
            'zh': '中文 (Chinese)',
            'ko': '한국어 (Korean)',
            'ar': 'العربية (Arabic)',
            'he': 'עברית (Hebrew)',
            'hi': 'हिन्दी (Hindi)',
            'th': 'ไทย (Thai)',
            'vi': 'Tiếng Việt'
        };

        function launchTheaterByIndex(index) {
            const movie = movieLibrary[index];
            playerMovieTitle.innerText = movie.title;
            activeMovieFile = movie.file;
			
			if (video) {
                video.currentTime = 0;
            }
            
			const pBar = document.getElementById('progress-bar') || (typeof progressBar !== 'undefined' ? progressBar : null);
            const pBall = document.getElementById('progress-ball') || (typeof progressBall !== 'undefined' ? progressBall : null);
            const cTime = document.getElementById('current-time') || (typeof currentTimeElem !== 'undefined' ? currentTimeElem : null);
			
			if (pBar) pBar.style.width = '0%';
            if (pBall) pBall.style.left = '0%';
            if (cTime) cTime.innerText = '0:00';
			
            video.src = movie.file;
            subCache = {};
            
            const subtitlesBtn = document.getElementById('subtitles-btn');
            const dynamicSubList = document.getElementById('dynamic-subtitles-list');
            dynamicSubList.innerHTML = ''; 

            if (movie.subtitles && Object.keys(movie.subtitles).length > 0) {
                subtitlesBtn.classList.remove('hidden');

                Object.keys(movie.subtitles).forEach(lang => {
                    subCache[lang] = parseSRT(movie.subtitles[lang]);

                    const langName = languageNames[lang] || lang.toUpperCase();
                    const btn = document.createElement('button');
                    btn.className = "sub-option-btn text-left px-3 py-2 rounded hover:bg-zinc-800 transition text-zinc-400 hover:text-white";
                    btn.setAttribute('data-lang', lang);
                    btn.innerText = langName;
                    btn.onclick = () => changeSubtitleTrack(lang);
                    
                    dynamicSubList.appendChild(btn);
                });
            } else {
                subtitlesBtn.classList.add('hidden');
            }
            
            changeSubtitleTrack('off');

            const savedTime = localStorage.getItem(`progress_${activeMovieFile}`);
            if (savedTime && parseFloat(savedTime) > 5) {
                resumeText.innerText = `Would you like to resume this movie at ${formatTime(parseFloat(savedTime))}?`;
                resumeModal.classList.remove('hidden');

                resumeBtnYes.onclick = () => {
                    resumeModal.classList.add('hidden');
                    startPlayback(parseFloat(savedTime));
                };

                resumeBtnNo.onclick = () => {
                    resumeModal.classList.add('hidden');
                    localStorage.removeItem(`progress_${activeMovieFile}`);
                    startPlayback(0);
                };
            } else {
                startPlayback(0);
            }
        }

        window.changeSubtitleTrack = function(lang) {
            activeSubtitleLanguage = lang;
            
            document.querySelectorAll('.sub-option-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === lang) {
                    btn.className = "sub-option-btn text-left px-3 py-2 rounded transition text-zinc-300 font-bold bg-zinc-800/50";
                } else {
                    btn.className = "sub-option-btn text-left px-3 py-2 rounded hover:bg-zinc-800 transition text-zinc-400 hover:text-white";
                }
            });

            if (lang === 'off') {
                parsedSubtitles = [];
                customSubText.classList.add('hidden');
            } else {
                parsedSubtitles = subCache[lang] || [];
            }
            subtitlesMenu.classList.add('hidden');
        };

        function startPlayback(startTime) {
            videoModal.classList.remove('hidden');
            if (startTime > 0) {
                video.currentTime = startTime;
            }
            video.play().catch(err => console.log("Playback:", err));
			updatePlayUI(true);
			resetControlTimeout();
            startProgressSaving();
        }

        function startProgressSaving() {
            if (progressSaveInterval) clearInterval(progressSaveInterval);
            progressSaveInterval = setInterval(() => {
                if (!video.paused && video.currentTime > 0 && activeMovieFile) {
                    if (video.duration - video.currentTime < 30) {
                        localStorage.removeItem(`progress_${activeMovieFile}`);
                    } else {
                        localStorage.setItem(`progress_${activeMovieFile}`, video.currentTime);
                    }
                }
            }, 5000);
        }

        function stopProgressSaving() {
            if (progressSaveInterval) {
                clearInterval(progressSaveInterval);
                progressSaveInterval = null;
            }
        }

        window.changeSubtitleTrack = function(lang) {
            activeSubtitleLanguage = lang;
            
            document.querySelectorAll('.sub-option-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === lang) {
                    btn.className = "sub-option-btn text-left px-3 py-2 rounded transition text-zinc-300 font-bold bg-zinc-800/50";
                } else {
                    btn.className = "sub-option-btn text-left px-3 py-2 rounded hover:bg-zinc-800 transition text-zinc-400 hover:text-white";
                }
            });

            if (lang === 'off') {
                parsedSubtitles = [];
                customSubText.classList.add('hidden');
            } else {
                parsedSubtitles = subCache[lang] || [];
            }
            subtitlesMenu.classList.add('hidden');
        };

        subtitlesBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            subtitlesMenu.classList.toggle('hidden');
        });

        document.addEventListener('click', () => {
            subtitlesMenu.classList.add('hidden');
        });

        video.addEventListener('timeupdate', () => {
            if (!isDraggingTimeline && !isNaN(video.duration)) {
                timeCurrent.innerText = formatTime(video.currentTime);
                updateTimelineWidths(video.currentTime, video.duration);
            }

            if (activeSubtitleLanguage === 'off' || parsedSubtitles.length === 0) {
                customSubText.classList.add('hidden');
                return;
            }

            const now = video.currentTime;
            const activeLine = parsedSubtitles.find(line => now >= line.start && now <= line.end);

            if (activeLine) {
                if (customSubText.innerText !== activeLine.text) {
                    customSubText.innerText = activeLine.text;
                    customSubText.classList.remove('hidden');
                }
            } else {
                customSubText.classList.add('hidden');
                customSubText.innerText = '';
            }
        });

		function setVolume(val) {
			val = Math.max(0, Math.min(1, val));
			currentVolume = val;
			video.volume = val;
			const pct = val * 100;

            volumeProgress.style.width = `${pct}%`;

            volumeHandle.style.left = `${pct}%`;

            volumeIndicator.innerText = `${Math.round(val * 100)}%`;

			if (val === 0) {
				volIcon.classList.add('hidden');
				muteIcon.classList.remove('hidden');
			} else {
				volIcon.classList.remove('hidden');
				muteIcon.classList.add('hidden');
			}
		}

        function getVolumeFromEvent(e) {
            const rect = volumeContainer.getBoundingClientRect();
            const posX = (e.clientX - rect.left) / rect.width;
            return Math.max(0, Math.min(1, posX));
        }

        volumeContainer.addEventListener('mousedown', (e) => {
            isDraggingVolume = true;
            setVolume(getVolumeFromEvent(e));
            resetControlTimeout();
        });

        volumeArea.addEventListener('wheel', (e) => {
            e.preventDefault();
            const step = 0.05;
            if (e.deltaY < 0) setVolume(currentVolume + step);
            else setVolume(currentVolume - step);
            resetControlTimeout();
        });

        muteBtn.addEventListener('click', () => {
            if (video.volume > 0) { 
                lastVolume = video.volume; 
                setVolume(0); 
            } else { 
                setVolume(lastVolume); 
            }
        });

        function updateTimelineWidths(currentTime, duration) {
            if (isNaN(duration)) return;
            const pct = (currentTime / duration) * 100;
            timelineProgress.style.width = `${pct}%`;
            timelineHandle.style.left = `${pct}%`;
        }

        video.addEventListener('loadedmetadata', () => {
            timeDuration.innerText = formatTime(video.duration);
        });

        function getTimelineTimeFromEvent(e) {
            const rect = timelineContainer.getBoundingClientRect();
            const posX = (e.clientX - rect.left) / rect.width;
            const clampedX = Math.max(0, Math.min(1, posX));
            return clampedX * video.duration;
        }

        timelineContainer.addEventListener('mousemove', (e) => {
			if (isNaN(video.duration)) return;
			const targetTime = getTimelineTimeFromEvent(e);
			timePreview.innerText = formatTime(targetTime);
			timePreview.classList.remove('hidden');

			const rect = timelineContainer.getBoundingClientRect();
			const offsetLeft = e.clientX - rect.left;
			timePreview.style.left = `${offsetLeft}px`;
			timePreview.style.transform = 'translateX(-50%)';
		});

        timelineContainer.addEventListener('mouseleave', () => {
            timePreview.classList.add('hidden');
        });

        timelineContainer.addEventListener('mousedown', (e) => {
            if (isNaN(video.duration)) return;
            isDraggingTimeline = true;
            handleTimelineScrub(e);
        });

        window.addEventListener('mousemove', (e) => {
            if (isDraggingTimeline) handleTimelineScrub(e);
            if (isDraggingVolume) {
                setVolume(getVolumeFromEvent(e));
                resetControlTimeout();
            }
        });

        window.addEventListener('mouseup', () => {
            if (isDraggingTimeline) isDraggingTimeline = false;
            if (isDraggingVolume) isDraggingVolume = false;
        });

        function handleTimelineScrub(e) {
            const newTime = getTimelineTimeFromEvent(e);
            video.currentTime = newTime;
            timeCurrent.innerText = formatTime(newTime);
            updateTimelineWidths(newTime, video.duration);
        }

        function togglePlay() {
            if (video.paused) { video.play(); updatePlayUI(true); }
            else { video.pause(); updatePlayUI(false); }
        }
        playPauseBtn.addEventListener('click', togglePlay);
        video.addEventListener('click', togglePlay);

        function updatePlayUI(isPlaying) {
            if (isPlaying) {
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
            } else {
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "00:00:00";
            const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
            const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) videoModal.requestFullscreen().catch(() => {});
            else document.exitFullscreen();
        });

        function resetControlTimeout() {
            playerControls.style.opacity = '1';
            playerTopBar.style.opacity = '1';
            videoModal.classList.remove('hide-cursor');
            clearTimeout(controlTimeout);
            if (!video.paused && !isDraggingTimeline && !isDraggingVolume) {
                controlTimeout = setTimeout(() => {
                    playerControls.style.opacity = '0';
                    playerTopBar.style.opacity = '0';
                    videoModal.classList.add('hide-cursor');
                }, 2500);
            }
        }
        videoModal.addEventListener('mousemove', resetControlTimeout);

        function closePlayer() {
            if (!video.paused && video.currentTime > 5 && activeMovieFile) {
                if (video.duration - video.currentTime > 30) {
                    localStorage.setItem(`progress_${activeMovieFile}`, video.currentTime);
                }
            }
            stopProgressSaving();
            video.pause();
            videoModal.classList.add('hidden');
            if (document.fullscreenElement) document.exitFullscreen();
        }

        closePlayerBtn.addEventListener('click', closePlayer);

        document.addEventListener('keydown', (e) => {
            if (!videoModal.classList.contains('hidden')) {
                
                if (e.key === ' ') { 
                    e.preventDefault(); 
                    togglePlay(); 
                    resetControlTimeout(); 
                }
                
                if (e.key === 'ArrowRight') { 
                    e.preventDefault();
                    video.currentTime += 10; 
                    resetControlTimeout(); 
                }
                
                if (e.key === 'ArrowLeft') { 
                    e.preventDefault();
                    video.currentTime -= 10; 
                    resetControlTimeout(); 
                }

                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    setVolume(currentVolume + 0.05);
                    resetControlTimeout();
                }

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    setVolume(currentVolume - 0.05);
                    resetControlTimeout();
                }

                if (e.key === 'm' || e.key === 'M') {
                    e.preventDefault();
                    if (video.volume > 0) { 
                        lastVolume = video.volume; 
                        setVolume(0); 
                    } else { 
                        setVolume(lastVolume); 
                    }
                    resetControlTimeout();
                }

                if (e.key === 'f' || e.key === 'F') {
                    e.preventDefault();
                    if (!document.fullscreenElement) {
                        videoModal.requestFullscreen().catch(() => {});
                    } else {
                        document.exitFullscreen();
                    }
                    resetControlTimeout();
                }
                
                if (e.key === 'Escape') { 
                    closePlayer(); 
                }
            }
        });
    </script>
</body>
</html>
